<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen de Historia Universal - Academia Sofía</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7b2d00;
            --primary-mid: #a84000;
            --primary-light: #d4691e;
            --primary-pale: #fdf0e8;
            --primary-ultra: #fff8f3;
            --rose: #f5ddd0;
            --warm-white: #ffffff;
            --warm-gray: #faf5f0;
            --text: #2a0e00;
            --text-soft: #6b3a1f;
            --border: #e8c4a8;
            --correct: #1a7a4a;
            --correct-bg: #e6f7ee;
            --incorrect: #c0392b;
            --incorrect-bg: #fdecea;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #f5ddd0 0%, #fff8f3 40%, #fde8d0 100%);
            min-height: 100vh;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .container {
            background: var(--warm-white);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(123,45,0,0.15), 0 0 0 1px rgba(123,45,0,0.12);
            max-width: 860px;
            width: 100%;
            overflow: hidden;
            animation: fadeUp 0.6s ease;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .academy-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-mid) 60%, #c45a20 100%);
            padding: 32px 40px 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .academy-header::before {
            content: '';
            position: absolute;
            top: -40px; left: -40px; right: -40px; bottom: -40px;
            background-image: repeating-linear-gradient(
                45deg, transparent, transparent 28px,
                rgba(255,255,255,0.06) 28px, rgba(255,255,255,0.06) 29px
            );
        }
        .logo-container {
            position: relative;
            width: 100%; max-width: 300px;
            margin: 0 auto 16px;
        }
        .logo-container img { width: 100%; height: auto; max-height: 120px; object-fit: contain; }
        .amber-divider {
            width: 80px; height: 3px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            margin: 10px auto 0;
        }
        .inner { padding: 36px 44px 40px; }
        .header { text-align: center; margin-bottom: 28px; }
        .header h1 {
            font-family: 'Cinzel', serif;
            font-size: 1.9em; color: var(--text);
            margin-bottom: 6px; letter-spacing: -0.5px;
        }
        .header h1 span { color: var(--primary); }
        .header p { color: var(--text-soft); font-size: 1em; font-weight: 600; }
        .progress-wrapper { margin-bottom: 28px; }
        .progress-info {
            display: flex; justify-content: space-between;
            font-size: 0.85em; color: var(--text-soft);
            font-weight: 700; margin-bottom: 8px;
        }
        .progress-bar { width: 100%; height: 10px; background: var(--rose); border-radius: 10px; overflow: hidden; }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            width: 0%; transition: width 0.4s ease; border-radius: 10px;
        }
        .question-card { display: none; animation: slideIn 0.35s ease; }
        .question-card.active { display: block; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .question-number {
            display: inline-block;
            background: var(--primary-pale); color: var(--primary);
            font-weight: 700; font-size: 0.82em;
            letter-spacing: 1.5px; text-transform: uppercase;
            padding: 5px 14px; border-radius: 50px; margin-bottom: 14px;
            border: 1.5px solid var(--border);
        }
        .question-text { font-size: 1.2em; color: var(--text); margin-bottom: 22px; line-height: 1.65; font-weight: 600; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option {
            padding: 16px 22px; border: 2px solid var(--border);
            border-radius: 12px; cursor: pointer; transition: all 0.25s ease;
            font-size: 1.05em; background: var(--warm-white); color: var(--text);
            display: flex; align-items: center; gap: 12px;
        }
        .option-letter {
            width: 30px; height: 30px; min-width: 30px; border-radius: 50%;
            background: var(--primary-ultra); border: 2px solid var(--primary-light);
            color: var(--primary); font-weight: 800; font-size: 0.85em;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.25s ease;
        }
        .option:hover {
            border-color: var(--primary); background: var(--primary-ultra);
            transform: translateX(6px); box-shadow: 0 4px 16px rgba(123,45,0,0.1);
        }
        .option:hover .option-letter { background: var(--primary); color: white; border-color: var(--primary); }
        .option.selected { border-color: var(--primary); background: var(--primary-pale); }
        .option.correct { border-color: var(--correct); background: var(--correct-bg); }
        .option.correct .option-letter { background: var(--correct); color: white; border-color: var(--correct); }
        .option.incorrect { border-color: var(--incorrect); background: var(--incorrect-bg); }
        .option.incorrect .option-letter { background: var(--incorrect); color: white; border-color: var(--incorrect); }
        .option.disabled { cursor: not-allowed; }
        .option.disabled:hover { transform: none; box-shadow: none; }
        .justification {
            display: none; margin-top: 20px; padding: 18px 22px;
            background: linear-gradient(to right, var(--primary-ultra), #fffaf6);
            border-left: 4px solid var(--primary); border-radius: 10px;
            animation: fadeUp 0.4s ease; font-size: 1em; color: var(--text-soft); line-height: 1.6;
        }
        .justification.show { display: block; }
        .justification strong { color: var(--primary); }
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 30px; gap: 14px; }
        .btn {
            padding: 14px 32px; border: none; border-radius: 10px;
            font-size: 1em; cursor: pointer; transition: all 0.25s ease;
            font-weight: 700; font-family: 'Nunito', sans-serif;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-mid));
            color: white; box-shadow: 0 4px 16px rgba(123,45,0,0.3); border: 2px solid transparent;
        }
        .btn-primary:hover {
            transform: translateY(-2px); box-shadow: 0 8px 24px rgba(123,45,0,0.4);
            background: linear-gradient(135deg, var(--primary-mid), var(--primary-light));
        }
        .btn-secondary { background: var(--warm-white); color: var(--text-soft); border: 2px solid var(--border); }
        .btn-secondary:hover { background: var(--primary-pale); border-color: var(--primary); color: var(--primary); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }
        .results { display: none; text-align: center; }
        .results.show { display: block; }
        .results h2 { font-family: 'Cinzel', serif; font-size: 1.9em; color: var(--text); margin-bottom: 8px; }
        .score-circle {
            width: 200px; height: 200px; border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--primary-mid));
            border: 5px solid var(--rose); color: white;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            margin: 28px auto 14px;
            box-shadow: 0 12px 40px rgba(123,45,0,0.3), 0 0 0 10px rgba(123,45,0,0.08);
        }
        .nota-label { font-size: 0.82em; opacity: 0.85; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 2px; color: rgba(255,255,255,0.85); }
        .nota-valor { font-family: 'Cinzel', serif; font-size: 4em; font-weight: 900; line-height: 1; color: white; }
        .nota-total { font-size: 1em; opacity: 0.75; }
        .score-detail {
            display: inline-block; background: var(--warm-white);
            border: 2px solid var(--border); border-radius: 12px;
            padding: 10px 28px; margin-bottom: 20px; font-size: 1em; color: var(--text-soft);
        }
        .score-detail span { font-weight: 800; color: var(--primary); }
        .grade-bar-container { width: 100%; max-width: 480px; margin: 0 auto 20px; }
        .grade-bar-bg { width: 100%; height: 16px; background: var(--rose); border-radius: 10px; overflow: hidden; margin-bottom: 6px; }
        .grade-bar-fill { height: 100%; border-radius: 10px; transition: width 1s ease; background: linear-gradient(90deg, var(--primary), var(--primary-light)); }
        .grade-bar-labels { display: flex; justify-content: space-between; font-size: 0.78em; color: #bbb; padding: 0 2px; }
        .grade-badge { display: inline-block; padding: 8px 24px; border-radius: 50px; font-weight: 800; font-size: 1em; margin-bottom: 16px; letter-spacing: 0.5px; }
        .badge-excelente   { background: #e6f7ee; color: #1a7a4a; border: 2px solid #2ecc71; }
        .badge-bueno       { background: #e8f4fd; color: #1565c0; border: 2px solid #3498db; }
        .badge-regular     { background: #fef9e7; color: #b7770d; border: 2px solid #f1c40f; }
        .badge-desaprobado { background: #fdecea; color: #c0392b; border: 2px solid #e74c3c; }
        .results p.result-msg {
            font-size: 1.1em; color: var(--text-soft); margin-bottom: 24px;
            line-height: 1.7; max-width: 500px; margin-left: auto; margin-right: auto;
        }
        .results-motto {
            background: linear-gradient(135deg, var(--primary), var(--primary-mid));
            color: white; padding: 14px 32px; border-radius: 50px;
            font-weight: 800; font-size: 1.05em; display: inline-block; margin-top: 8px;
            letter-spacing: 1.5px; text-transform: uppercase;
            box-shadow: 0 4px 16px rgba(123,45,0,0.3);
        }
        @media (max-width: 600px) {
            .inner { padding: 24px 20px; }
            .academy-header { padding: 24px 20px; }
            .header h1 { font-size: 1.5em; }
            .question-text { font-size: 1.05em; }
            .nav-buttons { flex-direction: column; }
            .score-circle { width: 160px; height: 160px; }
            .nota-valor { font-size: 3.2em; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="academy-header">
        <div class="logo-container">
            <img src="logo_SOFIA-Photoroom.png" alt="Logo Academia Sofía">
        </div>
        <div class="amber-divider"></div>
    </div>

    <div class="inner">
        <div class="header">
            <h1>🏛️ Examen de <span>Historia Universal</span></h1>
            <p>Ciclo Repaso · 38 Preguntas</p>
        </div>

        <div class="progress-wrapper">
            <div class="progress-info">
                <span id="progressText">Pregunta 1 de 38</span>
                <span id="progressPct">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div id="quizContainer"></div>

        <div class="results" id="results">
            <h2>🎉 ¡Examen Completado!</h2>
            <div class="score-circle">
                <div class="nota-label">Tu nota</div>
                <div class="nota-valor" id="finalNota">0</div>
                <div class="nota-total">/ 20</div>
            </div>
            <div class="score-detail">
                Respuestas correctas: <span id="finalScore">0</span> de <span id="totalQuestions">38</span>
            </div>
            <div class="grade-bar-container">
                <div class="grade-bar-bg">
                    <div class="grade-bar-fill" id="gradeBarFill" style="width:0%"></div>
                </div>
                <div class="grade-bar-labels"><span>0</span><span>5</span><span>10</span><span>15</span><span>20</span></div>
            </div>
            <div id="gradeBadge" class="grade-badge"></div>
            <p class="result-msg" id="resultMessage"></p>
            <div class="results-motto">— Tutor Franklin —</div>
            <br><br>
            <button class="btn btn-primary" onclick="restartQuiz()">🔄 Reintentar Examen</button>
        </div>

        <div class="nav-buttons" id="navButtons">
            <button class="btn btn-secondary" id="prevBtn" onclick="previousQuestion()">← Anterior</button>
            <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">Siguiente →</button>
        </div>
    </div>
</div>

<script>
const questions = [
    {
        question: "El conocimiento especializado que auxilia a la Historia, y se dedica a analizar e interpretar las inscripciones encontradas en los restos materiales, es denominado:",
        options: ["Paleografía", "Heráldica", "Numismática", "Epigrafía"],
        correct: 3,
        justification: "La epigrafía estudia las inscripciones grabadas en materiales duros como piedra o metal, siendo una ciencia auxiliar de la Historia."
    },
    {
        question: "El Homo ______ vivió en Europa y Asia durante el Paleolítico medio. Era robusto y de tórax ancho. Elaboraron los artefactos líticos de la cultura Musteriense y realizaban inhumaciones.",
        options: ["Hábilis", "Ergaster", "Erectus", "Neanderthalensis"],
        correct: 3,
        justification: "El Homo neanderthalensis corresponde al Paleolítico medio, creó la cultura Musteriense y fue el primero en practicar enterramientos rituales."
    },
    {
        question: "Una característica de la periodificación más popular de la historia universal, creada por el filósofo alemán Cristóbal Keller, es su:",
        options: ["Énfasis en los hechos económicos", "Valoración de los aportes cristianos", "Connotación eurocéntrica", "Presentación de hitos religiosos"],
        correct: 2,
        justification: "La periodización de Keller (Antigua, Media, Moderna) divide la historia desde una perspectiva centrada en Europa occidental."
    },
    {
        question: "La domesticación de plantas y animales durante el Neolítico trajo como consecuencia:",
        options: ["La aparición de la escritura alfabética", "La organización social en bandas", "El inicio del nomadismo intensivo", "El surgimiento de la propiedad privada"],
        correct: 3,
        justification: "El sedentarismo y los excedentes agrícolas del Neolítico generaron acumulación de bienes y el surgimiento de la propiedad privada."
    },
    {
        question: "Una característica socio-política que se manifestó en la Edad del Hierro fue:",
        options: ["La aparición de las primeras ciudades estado", "El inicio de la organización tribal", "El surgimiento de los clanes matriarcales", "La expansión de los estados esclavistas"],
        correct: 3,
        justification: "Las mejores herramientas y armas de hierro permitieron la expansión y consolidación de estados esclavistas."
    },
    {
        question: "Para el historiador griego Herodoto, Egipto era un don del río Nilo porque:",
        options: ["Sus crecientes anuales fertilizaban sus tierras", "Permitió el desarrollo del transporte y el comercio", "Sus caídas y cataratas generaban energía", "Los campesinos lo adoraban como a un dios"],
        correct: 0,
        justification: "Las inundaciones anuales del Nilo depositaban limo fértil que permitía la agricultura egipcia, base de la civilización."
    },
    {
        question: "En Egipto, durante el Imperio Antiguo, los privilegios de los gobernantes y sacerdotes trajeron como consecuencia el:",
        options: ["Debilitamiento de las rentas del Imperio y pérdidas de territorio", "Fortalecimiento de la alta burocracia militar y eclesiástica", "Fortalecimiento de los sacerdotes y la construcción de templos", "Debilitamiento del faraón y la ruptura de la unidad de Egipto"],
        correct: 3,
        justification: "Los privilegios excesivos de nobles y sacerdotes debilitaron el poder central del faraón y fragmentaron políticamente Egipto."
    },
    {
        question: "En Egipto, durante el Imperio Nuevo, ______ logró la máxima expansión, ______ implantó el monoteísmo y ______ construyó el templo de Abu Simbel.",
        options: ["Tutmosis III – Amenofis VI – Ramses I", "Tutmosis I – Tutankamón – Ramses II", "Akénatón – Amenofis IV – Ramses I", "Tutmosis III – Amenofis IV – Ramses II"],
        correct: 3,
        justification: "Tutmosis III fue el gran conquistador, Amenofis IV (Akenatón) instauró el culto monoteísta a Atón, y Ramsés II construyó el templo de Abu Simbel."
    },
    {
        question: "Correlación correcta entre los periodos y sus acontecimientos en la historia de Mesopotamia: I.Sumerio acadio / II.Primer Imperio babilónico / III.Imperio asirio / IV.Segundo Imperio babilónico — a.Expansión máxima / b.Invasión hitita / c.Zigurat de Marduk / d.Escritura cuneiforme",
        options: ["1d, 2b, 3c, 4a", "1a, 2b, 3c, 4d", "1b, 2a, 3d, 4c", "1d, 2b, 3a, 4c"],
        correct: 3,
        justification: "Los sumerios inventaron la escritura cuneiforme, los hititas invadieron el 1er Imperio babilónico, los asirios tuvieron la máxima expansión y el 2do Imperio babilónico construyó el Zigurat de Marduk."
    },
    {
        question: "En la historia de la antigua Grecia, la época conocida como Edad Oscura está relacionada con la:",
        options: ["Invasión de los dorios", "Fortificación de las polis", "Crisis en la producción", "Crisis en el comercio"],
        correct: 0,
        justification: "La invasión de los dorios destruyó la civilización micénica e inició el período de retroceso cultural conocido como Edad Oscura."
    },
    {
        question: "La estratificación social espartana estuvo formada por las tres clases sociales siguientes:",
        options: ["Espartanos - clase media - pobres", "Espartanos – clientes - plebeyos", "Espartanos – periecos - ilotas", "Espartanos – metecos - esclavos"],
        correct: 2,
        justification: "La sociedad espartana se dividía en espartiatas (ciudadanos plenos), periecos (libres sin derechos políticos) e ilotas (siervos del estado)."
    },
    {
        question: "El enfrentamiento de los griegos contra la expansión del Imperio Persa en Asia Menor, conocido como guerras Púnicas en el enunciado, ¿cuál fue su causa real?",
        options: ["El afán expansionista griego", "La riqueza de la Magna Grecia", "Expansión Persa de oriente a occidente", "La sublevación Jonia"],
        correct: 3,
        justification: "La causa directa fue la sublevación de las colonias jonias contra el dominio persa, lo que desencadenó la intervención de Atenas y el conflicto con Persia."
    },
    {
        question: "La religión griega se diferenciaba del politeísmo de los pueblos orientales en:",
        options: ["La humanización de los dioses", "El monoteísmo", "La fundamentación moral", "El culto doméstico"],
        correct: 0,
        justification: "Los griegos dieron a sus dioses forma, emociones y defectos humanos, a diferencia de los dioses orientales más abstractos y distantes."
    },
    {
        question: "Durante la república romana los ______ representaban el poder ejecutivo. Eran dos, tenían el control del ejército y su cargo duraba un año:",
        options: ["Senadores", "Ediles", "Dictadores", "Cónsules"],
        correct: 3,
        justification: "Los cónsules eran los magistrados más altos de la República romana, ejercían el poder ejecutivo y el mando militar por un año."
    },
    {
        question: "Mediante la ley ______ se comparten las magistraturas entre patricios y plebeyos, particularmente el cargo de cónsul:",
        options: ["Canuleya", "Licinia", "Pubilia", "Ogunilia"],
        correct: 1,
        justification: "La Ley Licinia (367 a.C.) estableció que uno de los dos cónsules debía ser plebeyo, abriendo las magistraturas a este grupo."
    },
    {
        question: "Establezca el orden cronológico correcto: I) Guerras púnicas  II) Octavio emperador  III) Primer Triunvirato  IV) Edicto de Milán",
        options: ["I, III, IV, II", "IV, II, I, III", "III, II, I, IV", "II, III, IV, I"],
        correct: 0,
        justification: "Guerras púnicas (s.III-II a.C.) → Triunvirato (60 a.C.) → Octavio emperador (27 a.C.) → Edicto de Milán (313 d.C.)."
    },
    {
        question: "El proceso de expansión republicana romana: primero conquistaron ______ en el sur. Luego enfrentaron a ______ en las guerras ______:",
        options: ["Sicilia – Persia – médicas", "Magna Grecia – Cartago – púnicas", "Córcega – Alejandría – púnicas", "Egipto – Persia – médicas"],
        correct: 1,
        justification: "Roma conquistó la Magna Grecia al sur de Italia y luego enfrentó a Cartago en las tres guerras púnicas para dominar el Mediterráneo occidental."
    },
    {
        question: "Roma durante la fase imperial protegió su línea de fronteras con un ejército permanente. Esta línea fronteriza se denominó:",
        options: ["Limes", "Línea Augusta", "Las líneas del Este", "Fortificaciones"],
        correct: 0,
        justification: "El Limes era el sistema de fronteras fortificadas del Imperio Romano que protegía sus territorios de las invasiones bárbaras."
    },
    {
        question: "Las tierras entregadas al siervo se llamaban ______ y las tierras cuya producción iba en favor de la nobleza feudal recibían el nombre de ______:",
        options: ["Manso - corvea", "Beneficio - manso", "Reserva - manso", "Manso - reserva"],
        correct: 3,
        justification: "El manso era la parcela del siervo para su sustento y la reserva era la tierra cuya producción beneficiaba directamente al señor feudal."
    },
    {
        question: "Característica que corresponde a los siervos de la Gleba en el régimen feudal:",
        options: ["Podían abandonar el feudo", "Buscan protección de otro señor", "Realizan la ceremonia del homenaje", "Carecían de libertad"],
        correct: 3,
        justification: "Los siervos de la gleba estaban atados a la tierra, no podían abandonarla ni elegir otro señor; carecían de libertad personal."
    },
    {
        question: "Al hacer alianzas con las iglesias, Carlomagno buscaba reforzar su poder político y religioso. Por ello el Imperio Carolingio se denominó:",
        options: ["El mensajero de Dios", "Brazo armado de la Iglesia", "Fuente del Catolicismo", "La peste medieval"],
        correct: 1,
        justification: "El Imperio Carolingio fue llamado el brazo armado de la Iglesia por su estrecha alianza militar y política con el papado."
    },
    {
        question: "Pipino el Breve, al derrocar al rey holgazán Childerico III, puso fin a la dinastía merovingia y:",
        options: ["Fundó la dinastía carolingia en el reino de los francos", "Terminó con los abusos de los lombardos", "Venció a los árabes en la batalla de Poitiers", "Estableció el Imperio Carolingio en las Galias"],
        correct: 0,
        justification: "Pipino el Breve fue el fundador de la dinastía carolingia tras deponer legalmente a Childerico III con apoyo papal."
    },
    {
        question: "Los siervos pagaban tasas al señor feudal y al clero. El pago por el uso de hornos y molinos se conocía como:",
        options: ["Las banalidades", "El diezmo y la corvea", "La pernada", "El portazgo"],
        correct: 0,
        justification: "Las banalidades eran los pagos obligatorios que los siervos hacían al señor por usar las instalaciones del feudo: hornos, molinos y lagares."
    },
    {

let currentQuestion = 0;
let score = 0;
let answered = false;
const userAnswers = [];

function initQuiz() { renderQuestion(); updateProgress(); updateButtons(); }

function renderQuestion() {
    const q = questions[currentQuestion];
    const container = document.getElementById('quizContainer');
    const letters = ['A', 'B', 'C', 'D', 'E'];
    container.innerHTML = `
        <div class="question-card active">
            <div class="question-number">Pregunta ${currentQuestion + 1} de ${questions.length}</div>
            <div class="question-text">${q.question}</div>
            <div class="options">
                ${q.options.map((option, index) => `
                    <div class="option" onclick="selectOption(${index})" data-index="${index}">
                        <span class="option-letter">${letters[index]}</span>
                        <span>${option}</span>
                    </div>
                `).join('')}
            </div>
            <div class="justification" id="justification">
                <strong>💡 Justificación:</strong> ${q.justification}
            </div>
        </div>
    `;
    if (userAnswers[currentQuestion] !== undefined) showPreviousAnswer();
}

function selectOption(index) {
    if (answered) return;
    const options = document.querySelectorAll('.option');
    options.forEach(opt => opt.classList.remove('selected'));
    options[index].classList.add('selected');
    answered = true;
    userAnswers[currentQuestion] = index;
    const q = questions[currentQuestion];
    setTimeout(() => {
        if (index === q.correct) { options[index].classList.add('correct'); score++; }
        else { options[index].classList.add('incorrect'); options[q.correct].classList.add('correct'); }
        options.forEach(opt => opt.classList.add('disabled'));
        document.getElementById('justification').classList.add('show');
        updateButtons();
    }, 300);
}

function showPreviousAnswer() {
    const options = document.querySelectorAll('.option');
    const userAnswer = userAnswers[currentQuestion];
    const q = questions[currentQuestion];
    options[userAnswer].classList.add('selected');
    if (userAnswer === q.correct) options[userAnswer].classList.add('correct');
    else { options[userAnswer].classList.add('incorrect'); options[q.correct].classList.add('correct'); }
    options.forEach(opt => opt.classList.add('disabled'));
    document.getElementById('justification').classList.add('show');
    answered = true;
}

function nextQuestion() {
    if (!answered && userAnswers[currentQuestion] === undefined) {
        alert('Por favor, selecciona una respuesta antes de continuar.');
        return;
    }
    if (currentQuestion < questions.length - 1) {
        currentQuestion++;
        answered = userAnswers[currentQuestion] !== undefined;
        renderQuestion(); updateProgress(); updateButtons();
        window.scrollTo(0, 0);
    } else { showResults(); }
}

function previousQuestion() {
    if (currentQuestion > 0) {
        currentQuestion--;
        answered = true;
        renderQuestion(); updateProgress(); updateButtons();
        window.scrollTo(0, 0);
    }
}

function updateButtons() {
    document.getElementById('prevBtn').disabled = currentQuestion === 0;
    document.getElementById('nextBtn').textContent = (currentQuestion === questions.length - 1)
        ? (answered ? 'Ver Resultados 🎯' : 'Finalizar 🎯')
        : 'Siguiente →';
}

function updateProgress() {
    const pct = Math.round(((currentQuestion + 1) / questions.length) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = `Pregunta ${currentQuestion + 1} de ${questions.length}`;
    document.getElementById('progressPct').textContent = pct + '%';
}

function showResults() {
    document.getElementById('quizContainer').style.display = 'none';
    document.getElementById('navButtons').style.display = 'none';
    document.getElementById('results').classList.add('show');
    const total = questions.length;
    const nota = Math.round((score / total) * 20);
    document.getElementById('finalScore').textContent = score;
    document.getElementById('totalQuestions').textContent = total;
    document.getElementById('finalNota').textContent = nota;
    setTimeout(() => {
        document.getElementById('gradeBarFill').style.width = ((nota / 20) * 100) + '%';
    }, 200);
    const badge = document.getElementById('gradeBadge');
    const msg = document.getElementById('resultMessage');
    if (nota >= 17) {
        badge.textContent = '🏆 Sobresaliente'; badge.className = 'grade-badge badge-excelente';
        msg.textContent = '¡Excelente dominio de Historia Universal! Conoces con solidez desde las civilizaciones antiguas hasta la Edad Media. ¡Así se ingresa! 🌟';
    } else if (nota >= 14) {
        badge.textContent = '👏 Aprobado — Bueno'; badge.className = 'grade-badge badge-bueno';
        msg.textContent = '¡Muy bien! Tienes buenos conocimientos históricos. Refuerza los temas donde fallaste y estarás listo para el examen de admisión. 📚';
    } else if (nota >= 11) {
        badge.textContent = '📖 Aprobado — Regular'; badge.className = 'grade-badge badge-regular';
        msg.textContent = 'Vas por buen camino, pero hay períodos que necesitan más repaso. ¡Tú puedes mejorar, sigue adelante! ✏️';
    } else {
        badge.textContent = '💪 Desaprobado — Sigue intentando'; badge.className = 'grade-badge badge-desaprobado';
        msg.textContent = 'No te rindas. Cada error es una lección. Repasa la línea del tiempo con calma, vuelve a intentarlo y verás cómo mejoras. ¡Ánimo! 🔥';
    }
}

function restartQuiz() {
    currentQuestion = 0; score = 0; answered = false; userAnswers.length = 0;
    document.getElementById('gradeBarFill').style.width = '0%';
    document.getElementById('quizContainer').style.display = 'block';
    document.getElementById('navButtons').style.display = 'flex';
    document.getElementById('results').classList.remove('show');
    initQuiz();
}

initQuiz();
</script>
